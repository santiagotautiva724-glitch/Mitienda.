<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Oficial</title>
    <style>
        :root { --primary: #1a5631; --accent: #f59e0b; --bg: #ffffff; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .seccion-nueva { background: #fff3cd; padding: 15px 10px; border-bottom: 2px solid #ffeeba; }
        h2 { color: var(--primary); font-size: 1.2rem; margin-left: 10px; }
        .row { display: flex; overflow-x: auto; gap: 15px; padding: 10px; }
        .card { background: white; min-width: 150px; border-radius: 10px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        .btn { display: block; background: #25d366; color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>TU CASA DIGITAL</header>

<div class="seccion-nueva">
    <h2>👨‍🍳 Gastronomía y Salud (NUEVO)</h2>
    <div class="row">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300">
            <p><b>Diabéticos</b></p>
            <a href="#" class="btn">Ver Recetas</a>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=300">
            <p><b>Postres</b></p>
            <a href="#" class="btn">Ver Postres</a>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300">
            <p><b>Internacional</b></p>
            <a href="#" class="btn">Ver Platos</a>
        </div>
    </div>
</div>

<div class="container">
    <h2>🌸 Bienestar</h2>
    <div class="row">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=300">
            <p><b>Cuidado Propio</b></p>
        </div>
    </div>
    <h2>🛠️ Mecánica</h2>
    <div class="row">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=300">
            <p><b>Diagnosis</b></p>
        </div>
    </div>
</div>

</body>
</html>
