<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa Digital - Ebooks de Expertos</title>
    <style>
        :root {
            --primary: #1a5631;
            --accent: #f59e0b;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); }
        
        header { background-color: var(--primary); color: white; padding: 20px 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.75rem; font-weight: 800; }
        
        .container { padding: 10px 15px 40px; max-width: 1200px; margin: 0 auto; }
        h2.section-title { font-size: 1.5rem; color: var(--primary); border-bottom: 3px solid var(--accent); display: inline-block; margin-top: 30px; }

        .book-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; }
        .book-card { background: var(--card-bg); min-width: 200px; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        
        /* Estilos de la ventana que flota */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-contenido { background: white; margin: 15% auto; padding: 20px; width: 85%; max-width: 400px; border-radius: 20px; position: relative; text-align: center; }
        .cerrar { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }
        
        .buy-btn { display: block; background-color: #25d366; color: white; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div class="brand">Tu Casa Digital</div>
</header>

<div class="container">
    <h2 class="section-title">🌸 Bienestar Integral</h2>
    <div class="book-row">
        <div class="book-card">
            <img src="https://picsum.photos/id/24/400/600" alt="Portada" onclick="abrirModal()" style="cursor:pointer; width:100%; border-radius:10px;">
            <div onclick="abrirModal()" style="cursor:pointer;">
                <div style="font-weight:bold; margin-top:10px;">El Arte del Cuidado Propio</div>
                <div style="color:var(--primary); font-weight:bold;">$15.000</div>
            </div>
        </div>
    </div>
</div>

<div id="miModal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <img src="https://picsum.photos/id/24/400/600" alt="Vista previa" style="width:100%; border-radius:10px; margin-bottom:15px;">
        <h2>El Arte del Cuidado Propio</h2>
        <p>Guía completa para tu bienestar.</p>
        <a href="https://wa.me/573223693926?text=Hola!%20Quiero%20el%20libro" class="buy-btn">Comprar por WhatsApp</a>
    </div>
</div>

<script>
    function abrirModal() { document.getElementById("miModal").style.display = "block"; }
    function cerrarModal() { document.getElementById("miModal").style.display = "none"; }
    window.onclick = function(event) {
        if (event.target == document.getElementById("miModal")) { cerrarModal(); }
    }
</script>

</body>
</html>
