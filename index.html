<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperationEbook | Catálogo S.E.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-green: #00ff66;
            --dark-bg: #000000;
            --card-gray: #121212;
            --yellow-accent: #f1c40f;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* Banner Superior de Acceso */
        .top-banner {
            color: var(--neon-green);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Barra de Búsqueda */
        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-container input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--yellow-accent);
            padding: 12px 40px;
            border-radius: 25px;
            color: #888;
            box-sizing: border-box;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00bcd4;
        }

        /* Etiquetas de Filtro */
        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .tag {
            border: 1px solid var(--neon-green);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tag.active {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Título de Sección */
        .section-title {
            border-left: 4px solid var(--neon-green);
            padding-left: 15px;
            text-transform: uppercase;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--yellow-accent);
        }

        /* Tarjeta de Producto */
        .product-card {
            background: var(--card-gray);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            max-width: 400px;
        }

        .product-image {
            width: 100%;
            height: 200px;
            background-image: url('https://via.placeholder.com/400x200'); /* Reemplazar con tu imagen de motor */
            background-size: cover;
            background-position: center;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .product-price {
            color: var(--neon-green);
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-banner">
        ⚡ ACCESO ELITE TERMINA EN: 9:44
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar conocimiento S.E...">
    </div>

    <div class="filter-tags">
        <div class="tag active">TODO</div>
        <div class="tag">JÓVENES</div>
        <div class="tag">PRO S.E.</div>
        <div class="tag">VER TODO</div>
        <div class="tag">COMBOS</div>
        <div class="tag">GUÍAS</div>
    </div>

    <h2 class="section-title">COMBOS DE ALTO VALOR</h2>

    <div class="product-card">
        <div class="product-image"></div> <div class="product-info">
            <div class="product-title">Master Combo Mecánico</div>
            <div class="product-price">$48,000</div>
        </div>
    </div>

</body>
</html>
