<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa Digital - Catálogo Completo</title>
    <style>
        :root {
            --verde-app: #1a4d2e;
            --amarillo-detalle: #ffcc00;
            --fondo: #f0f2f5;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--fondo); padding-bottom: 30px; }
        
        /* Cabecera y Buscador */
        .header { background: var(--verde-app); color: white; text-align: center; padding: 25px; font-size: 26px; font-weight: bold; }
        .sticky-controls { position: sticky; top: 0; z-index: 1000; background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-input { width: 100%; padding: 14px; border-radius: 30px; border: 1.5px solid #ddd; font-size: 16px; box-sizing: border-box; }

        /* Filtros Deslizantes */
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .btn-tag { padding: 10px 20px; border-radius: 25px; border: 1.5px solid var(--verde-app); background: white; white-space: nowrap; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .btn-tag.active { background: var(--verde-app); color: white; }

        /* Grid de Contenido */
        .container { padding: 0 15px; }
        .cat-title { color: var(--verde-app); border-left: 5px solid var(--amarillo-detalle); padding-left: 10px; margin: 30px 0 15px; font-size: 22px; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        /* Tarjetas de Libros */
        .book-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .book-card:hover { transform: translateY(-8px); }
        .book-card img { width: 100%; height: 210px; object-fit: cover; }
        .book-info { padding: 12px; text-align: center; }
        .book-info h3 { font-size: 15px; margin: 0 0 8px; color: #222; height: 36px; overflow: hidden; }
        .book-info .price { color: var(--verde-app); font-weight: bold; font-size: 18px; }

        /* Ficha Modal (Descripción Larga) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 92%; max-width: 450px; border-radius: 25px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }
        .modal-img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        .long-description { text-align: justify; line-height: 1.6; color: #555; font-size: 15px; border-top: 1px solid #eee; padding-top: 15px; margin: 15px 0; }
        
        /* Botón WhatsApp */
        .wa-button { background: #25d366; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="header">TU CASA DIGITAL</div>

<div class="sticky-controls">
    <input type="text" id="mainSearch" class="search-input" placeholder="🔍 Buscar por nombre, tema o autor..." onkeyup="app.render()">
    <div class="filter-scroll">
        <button class="btn-tag active" onclick="app.setCategory('Todos', this)">🌟 Todos</button>
        <button class="btn-tag" onclick="app.setAge('menores', this)">👦 Menores</button>
        <button class="btn-tag" onclick="app.setAge('mayores', this)">👤 Mayores</button>
        <button class="btn-tag" onclick="app.setCategory('Gastronomía', this)">🍳 Gastronomía</button>
        <button class="btn-tag" onclick="app.setCategory('Mecánica', this)">🔧 Mecánica</button>
        <button class="btn-tag" onclick="app.setCategory('Bienestar', this)">🌸 Bienestar</button>
        <button class="btn-tag" onclick="app.setCategory('Ficción', this)">📚 Ficción</button>
        <button class="btn-tag" onclick="app.setCategory('Tecnología', this)">💻 Tecnología</button>
        <button class="btn-tag" onclick="app.setCategory('Autoayuda', this)">📈 Autoayuda</button>
    </div>
</div>

<div class="container" id="mainCatalog"></div>

<div id="bookModal" class="modal" onclick="app.closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="app.closeModal()">&times;</span>
        <img id="modalImg" class="modal-img">
        <h2 id="modalTitle" style="margin: 0; color: var(--verde-app);"></h2>
        <p id="modalCat" style="color: #888; margin: 5px 0; font-weight: bold;"></p>
        <p id="modalPrice" style="font-size: 24px; color: var(--verde-app); font-weight: bold; margin: 10px 0;"></p>
        <div id="modalLongDesc" class="long-description"></div>
        <a id="waLink" href="#" target="_blank" class="wa-button">
            Comprar por WhatsApp 💬
        </a>
    </div>
</div>

<script>
    const app = {
        category: 'Todos',
        age: 'Todos',
        // WHATSAPP: Cambia este número por el tuyo (sin el +)
        miTelefono: "573100000000", 

        books: [
            // GASTRONOMÍA
            { titulo: "Recetas para Diabéticos", precio: "$25.000", cat: "Gastronomía", edad: "mayores", img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=500", desc: "La guía más completa para mantener tu glucosa bajo control sin sacrificar el sabor. Incluye planes de comidas para 30 días, tablas nutricionales detalladas y consejos médicos sobre qué alimentos evitar. Ideal para quienes buscan cambiar su estilo de vida radicalmente con recetas fotorrealistas y fáciles de seguir." },
            { titulo: "Postres Sin Azúcar", precio: "$20.000", cat: "Gastronomía", edad: "menores", img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=500", desc: "¡El paraíso de los dulces saludables! Aprende a usar endulzantes naturales y frutas para crear postres que parecen de pastelería profesional. Esta guía incluye videos explicativos y una sección especial para cocinar con niños de forma segura." },
            
            // MECÁNICA Y TECNOLOGÍA
            { titulo: "Electricidad Auto Pro", precio: "$27.000", cat: "Mecánica", edad: "mayores", img: "https://images.unsplash.com/photo-1487700160041-babef9c3cb55?w=500", desc: "Domina el sistema eléctrico de cualquier vehículo moderno. Desde el alternador hasta los sensores de inyección electrónica. Este manual técnico incluye diagramas de cableado a color y una guía de diagnóstico de fallas comunes que te ahorrará miles en el taller." },
            { titulo: "Motores de Inyección", precio: "$30.000", cat: "Tecnología", edad: "mayores", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500", desc: "Un estudio profundo sobre la ingeniería de los motores actuales. Analiza la eficiencia del combustible, sistemas de escape y turbocargadores. Una herramienta indispensable para estudiantes de mecánica y entusiastas del motor." },

            // BIENESTAR
            { titulo: "Yoga Total y Relajación", precio: "$16.000", cat: "Bienestar", edad: "menores", img: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=500", desc: "Transforma tu cuerpo y mente con rutinas de solo 15 minutos al día. Incluye más de 40 asanas (posturas) explicadas paso a paso con beneficios específicos para la flexibilidad, la reducción del estrés laboral y la mejora del sueño." },
            { titulo: "Mente Sana en Casa", precio: "$18.000", cat: "Bienestar", edad: "mayores", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=500", desc: "Descubre el poder de la psicología positiva y la meditación guiada. Este libro te brinda herramientas prácticas para gestionar la ansiedad diaria, mejorar tus relaciones personales y encontrar un propósito diario a través del mindfulness." },

            // FICCIÓN Y LITERATURA
            { titulo: "Zero to One - Futuro", precio: "Consultar", cat: "Ficción", edad: "menores", img: "https://images.unsplash.com/photo-1589829085413-56de8ae18c73?w=500", desc: "La biblia moderna del emprendimiento. Peter Thiel nos enseña que el próximo Bill Gates no creará un sistema operativo, sino algo totalmente nuevo. Aprende a pensar de 0 a 1 y a construir empresas que dominen el mercado a través de la innovación." },
            { titulo: "Ego is the Enemy", precio: "Consultar", cat: "Autoayuda", edad: "mayores", img: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=500", desc: "Un análisis histórico sobre cómo el ego ha destruido carreras y naciones. Ryan Holiday nos muestra, a través de ejemplos de grandes líderes, cómo la humildad y el trabajo silencioso son las verdaderas llaves del éxito duradero en cualquier profesión." }
        ],

        init() { this.render(); },

        render() {
            const catalog = document.getElementById('mainCatalog');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            catalog.innerHTML = '';

            const categories = [...new Set(this.books.map(b => b.cat))];

            categories.forEach(catName => {
                const filtered = this.books.filter(b => {
                    const matchCat = (this.category === 'Todos' || b.cat === this.category);
                    const matchAge = (this.age === 'Todos' || b.edad === this.age);
                    const matchSearch = b.titulo.toLowerCase().includes(search) || b.cat.toLowerCase().includes(search);
                    return matchCat && matchAge && matchSearch && b.cat === catName;
                });

                if (filtered.length > 0) {
                    let section = `<h2 class="cat-title">${catName}</h2><div class="book-grid">`;
                    filtered.forEach(b => {
                        section += `
                            <div class="book-card" onclick="app.openModal('${b.titulo}')">
                                <img src="${b.img}" alt="${b.titulo}">
                                <div class="book-info">
                                    <h3>${b.titulo}</h3>
                                    <div class="price">${b.precio}</div>
                                </div>
                            </div>`;
                    });
                    section += `</div>`;
                    catalog.innerHTML += section;
                }
            });
        },

        setCategory(cat, btn) {
            this.category = cat;
            this.age = 'Todos';
            this.updateBtns(btn);
            this.render();
        },

        setAge(age, btn) {
            this.age = age;
            this.category = 'Todos';
            this.updateBtns(btn);
            this.render();
        },

        updateBtns(activeBtn) {
            document.querySelectorAll('.btn-tag').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        },

        openModal(titulo) {
            const b = this.books.find(x => x.titulo === titulo);
            document.getElementById('modalTitle').innerText = b.titulo;
            document.getElementById('modalCat').innerText = "📚 " + b.cat;
            document.getElementById('modalPrice').innerText = b.precio;
            document.getElementById('modalLongDesc').innerText = b.desc;
            document.getElementById('modalImg').src = b.img;
            
            // Configurar Link de WhatsApp
            const mensaje = encodeURIComponent(`Hola, estoy interesado en comprar el libro: *${b.titulo}* de la categoría *${b.cat}*. ¿Me dan más información?`);
            document.getElementById('waLink').href = `https://wa.me/${this.miTelefono}?text=${mensaje}`;
            
            document.getElementById('bookModal').style.display = 'flex';
        },

        closeModal() { document.getElementById('bookModal').style.display = 'none'; }
    };

    app.init();
</script>
</body>
</html>
