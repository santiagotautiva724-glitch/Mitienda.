<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E. Premium - Superarationebook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-obscuro: #0a2617;
            --verde-premium: #0f3d24;
            --dorado-brillante: #ffcc00;
            --dorado-mate: #d4af37;
            --rojo-alerta: #ff4757;
            --blanco-puro: #ffffff;
            --gris-suave: #f1f2f6;
        }

        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--gris-suave); color: #2f3542; padding-bottom: 50px; }

        .brand-header { text-align: center; padding: 20px 15px; background: white; border-bottom: 3px solid var(--dorado-brillante); }
        .full-logo { font-size: 24px; font-weight: 800; color: var(--verde-premium); letter-spacing: -1px; text-transform: uppercase; }
        .full-logo span { color: var(--dorado-mate); }

        .sticky-nav { position: sticky; top: 0; z-index: 2000; background: linear-gradient(135deg, var(--verde-obscuro), var(--verde-premium)); padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .global-timer { text-align: center; color: var(--dorado-brillante); font-weight: 800; font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
        
        .search-container { display: flex; justify-content: center; padding: 0 10px; }
        .search-input { width: 100%; max-width: 400px; padding: 10px 20px; border-radius: 25px; border: 2px solid var(--dorado-mate); outline: none; font-weight: 600; font-size: 14px; }

        .filters-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; }
        .age-filters, .cat-filters { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        .btn-filter { padding: 8px 15px; border-radius: 20px; border: 1.5px solid var(--dorado-mate); background: transparent; color: white; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.3s; }
        .btn-filter.active { background: var(--dorado-brillante); color: var(--verde-premium); border-color: var(--dorado-brillante); }

        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .section-title { font-size: 18px; font-weight: 800; color: var(--verde-premium); margin: 30px 0 15px; text-transform: uppercase; display: flex; align-items: center; }
        .section-title::after { content: ""; flex: 1; height: 2px; background: var(--dorado-brillante); margin-left: 10px; border-radius: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.06); text-align: center; cursor: pointer; position: relative; transition: 0.4s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); border-color: var(--dorado-mate); }
        
        .se-mini-logo { position: absolute; top: 8px; right: 8px; background: var(--dorado-brillante); color: var(--verde-premium); font-weight: 800; padding: 3px 6px; border-radius: 6px; font-size: 9px; z-index: 10; }
        .badge-oferta { position: absolute; top: 8px; left: 8px; background: var(--rojo-alerta); color: white; padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; z-index: 10; }

        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { color: var(--verde-premium); font-weight: 800; font-size: 16px; margin-top: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 38, 23, 0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 92%; max-width: 400px; border-radius: 25px; padding: 20px; position: relative; text-align: center; border: 2px solid var(--dorado-brillante); max-height: 90vh; overflow-y: auto; }
        
        .combo-details { text-align: left; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px;}
        .combo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #f9f9f9;}
        .combo-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
        .combo-item-title { font-size: 12px; font-weight: 600; color: #333; }
        .combo-item-price { font-size: 11px; color: var(--verde-premium); font-weight: bold; }

        .btn-buy { background: linear-gradient(to right, var(--verde-premium), #1a6d3d); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 15px; margin-bottom: 10px; }
        .btn-gift { background:none; border:none; color:var(--verde-premium); font-weight:700; cursor:pointer; font-size: 13px; }

        .vision-container { background: var(--verde-obscuro); color: white; padding: 30px 20px; border-radius: 25px; margin: 40px 0; position: relative; overflow: hidden; }
        .footer { background: #05140c; color: white; padding: 30px 15px; text-align: center; font-size: 12px;}
    </style>
</head>
<body>

<div class="brand-header">
    <div class="full-logo">Superaration<span>ebook</span></div>
</div>

<div class="sticky-nav">
    <div class="global-timer">⚡ Ofertas S.E. expiran en: <span class="timer-display">09:59</span></div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar guías o combos S.E..." onkeyup="app.render()">
    </div>
    <div class="filters-container">
        <div class="age-filters">
            <button id="btnAgeTodos" class="btn-filter active" onclick="app.setAge('Todos')">TODOS</button>
            <button id="btnAgeMenores" class="btn-filter" onclick="app.setAge('Menores')">JÓVENES</button>
            <button id="btnAgeMayores" class="btn-filter" onclick="app.setAge('Mayores')">PRO S.E.</button>
        </div>
        <div class="cat-filters">
            <button id="btnCatTodos" class="btn-filter active" onclick="app.setCat('Todos')">TODO</button>
            <button id="btnCatPacks" class="btn-filter" onclick="app.setCat('Packs')">COMBOS</button>
            <button id="btnCatGuias" class="btn-filter" onclick="app.setCat('Guias')">GUÍAS</button>
            <button id="btnCatLibros" class="btn-filter" onclick="app.setCat('Libros')">LIBROS</button>
        </div>
    </div>
</div>

<div class="container" id="mainCatalog"></div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="app.closeM()">&times;</span>
        <div class="global-timer" style="color:var(--rojo-alerta)">⏱️ ¡OFERTA TERMINA EN: <span class="timer-display">09:59</span>!</div>
        <img id="mImg" style="width:100%; height:180px; object-fit:cover; border-radius:15px; margin-bottom:10px;">
        <h3 id="mTitle" style="color:var(--verde-premium); margin:5px 0; font-size:18px;"></h3>
        <p id="mDesc" style="font-size:12px; color:#555; text-align:left; margin-bottom:15px;"></p>
        
        <div id="mComboDetails" class="combo-details" style="display:none;">
            <div style="font-size:12px; font-weight:700; color:var(--verde-premium); margin-bottom:10px;">Artículos Incluidos:</div>
            <div id="mComboItemsList"></div>
        </div>

        <div id="mPrice" style="font-size:28px; font-weight:800; color:var(--verde-premium); margin-bottom:15px;"></div>
        <button class="btn-buy" onclick="app.buy(false)">ADQUIRIR POR WHATSAPP 💬</button>
        <button class="btn-gift" onclick="app.buy(true)">🎁 ENVIAR COMO REGALO S.E.</button>
    </div>
</div>

<script>
    const app = {
        tel: "573223693926",
        ageFilter: 'Todos',
        catFilter: 'Todos',
        timeLeft: 599,

        // Ítems individuales para el desglose de combos
        items: {
            g1: { t: "Electricidad Auto Pro", p: 15000, img: "https://images.unsplash.com/photo-1504222490345-c075b6008014?w=150" },
            g2: { t: "Porsy 11 Automotriz", p: 18000, img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=150" },
            g3: { t: "Inyección Electrónica", p: 15000, img: "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=150" },
            l1: { t: "Hábitos Atómicos", p: 14000, img: "https://images.unsplash.com/photo-1589998059171-988d887df646?w=150" },
            l2: { t: "Ego is the Enemy", p: 12000, img: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=150" }
        },

        // Base de datos de productos con categorías corregidas
        products: [
            { id: 101, tipo: "Packs", edad: "Mayores", t: "Master Combo Mecánico", p: 48000, img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=500", desc: "Kit experto automotriz.", items: ['g1', 'g2', 'g3'] },
            { id: 1, tipo: "Guias", edad: "Mayores", t: "Porsy 11 Automotriz", p: 18000, img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500", desc: "Ingeniería de motores." },
            { id: 9, tipo: "Libros", edad: "Menores", t: "Inversionista Joven", p: 10000, img: "https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=500", desc: "Finanzas para jóvenes." },
            { id: 6, tipo: "Libros", edad: "Mayores", t: "Hábitos Atómicos", p: 14000, img: "https://images.unsplash.com/photo-1589998059171-988d887df646?w=500", desc: "Cambia tu vida." }
        ],

        init() {
            this.render();
            this.startTimer();
        },

        startTimer() {
            setInterval(() => {
                this.timeLeft--;
                if (this.timeLeft <= 0) this.timeLeft = 599;
                let min = Math.floor(this.timeLeft / 60);
                let sec = this.timeLeft % 60;
                let str = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                document.querySelectorAll('.timer-display').forEach(el => el.innerText = str);
            }, 1000);
        },

        setAge(val) {
            this.ageFilter = val;
            document.querySelectorAll('.age-filters .btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById('btnAge' + val).classList.add('active');
            this.render();
        },

        setCat(val) {
            this.catFilter = val;
            document.querySelectorAll('.cat-filters .btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById('btnCat' + val).classList.add('active');
            this.render();
        },

        render() {
            const catalog = document.getElementById('mainCatalog');
            const search = document.getElementById('searchInput').value.toLowerCase();
            catalog.innerHTML = '';

            const types = this.catFilter === 'Todos' ? ["Packs", "Guias", "Libros"] : [this.catFilter];

            types.forEach(tipo => {
                const filtered = this.products.filter(p => 
                    p.tipo === tipo && 
                    p.t.toLowerCase().includes(search) && 
                    (this.ageFilter === 'Todos' || p.edad === this.ageFilter)
                );

                if (filtered.length > 0) {
                    let html = `<div class="section-title">${tipo}</div><div class="grid">`;
                    filtered.forEach(p => {
                        html += `<div class="card" onclick="app.openM(${p.id})">
                            <div class="se-mini-logo">S.E.</div>
                            <img src="${p.img}">
                            <div class="card-body">
                                <div style="font-weight:600; font-size:12px; height:32px; overflow:hidden;">${p.t}</div>
                                <div class="price">$${p.p.toLocaleString()}</div>
                            </div>
                        </div>`;
                    });
                    catalog.innerHTML += html + '</div>';
                }
            });
        },

        openM(id) {
            const p = this.products.find(x => x.id === id);
            this.selectedId = id;
            document.getElementById('mTitle').innerText = p.t;
            document.getElementById('mDesc').innerText = p.desc;
            document.getElementById('mPrice').innerText = `$${p.p.toLocaleString()}`;
            document.getElementById('mImg').src = p.img;

            const comboDiv = document.getElementById('mComboDetails');
            const list = document.getElementById('mComboItemsList');
            if (p.items) {
                comboDiv.style.display = 'block';
                list.innerHTML = p.items.map(id => {
                    const i = this.items[id];
                    return `<div class="combo-item">
                        <img src="${i.img}">
                        <div class="combo-item-title">${i.t} <br><span class="combo-item-price">$${i.p.toLocaleString()}</span></div>
                    </div>`;
                }).join('');
            } else {
                comboDiv.style.display = 'none';
            }
            document.getElementById('infoModal').style.display = 'flex';
        },

        closeM() { document.getElementById('infoModal').style.display = 'none'; },

        buy(gift) {
            const p = this.products.find(x => x.id === this.selectedId);
            const msg = encodeURIComponent(`${gift ? '🎁 Regalo:' : '👋 Hola!'} quiero ${p.t} ($${p.p.toLocaleString()})`);
            window.open(`https://wa.me/${this.tel}?text=${msg}`);
        }
    };

    app.init();
</script>
</body>
</html>
