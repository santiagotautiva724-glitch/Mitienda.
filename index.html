<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa Digital</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        
        /* Encabezado */
        .header { background-color: #1a4d2e; color: white; text-align: center; padding: 15px; font-weight: bold; font-size: 20px; }
        
        /* Buscador */
        .search-container { padding: 10px; background: white; }
        .search-bar { width: 90%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; display: block; margin: auto; }

        /* Categorías y Filtros */
        .filters { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #fff; border-bottom: 2px solid #e0e0e0; }
        .filter-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 15px; white-space: nowrap; cursor: pointer; }
        .age-toggle { display: flex; justify-content: space-around; padding: 10px; background: #fff; }
        .age-btn { flex: 1; margin: 0 5px; padding: 10px; border-radius: 5px; border: 1px solid #1a4d2e; background: white; cursor: pointer; }
        .age-btn:hover { background: #1a4d2e; color: white; }

        /* Secciones */
        .section-title { color: #1a4d2e; padding: 15px 10px 5px; font-size: 18px; display: flex; align-items: center; }
        .card-container { display: flex; overflow-x: auto; padding: 10px; gap: 15px; }
        .card { background: white; min-width: 140px; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; border-radius: 5px; background: #eee; height: 100px; object-fit: cover; }
        .price { color: #1a4d2e; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">TU CASA DIGITAL</div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="🔍 Buscar libros o servicios...">
    </div>

    <div class="age-toggle">
        <button class="age-btn">Menores</button>
        <button class="age-btn">Mayores</button>
    </div>

    <div class="filters">
        <button class="filter-btn">Mente Sana</button>
        <button class="filter-btn">Yoga</button>
        <button class="filter-btn">Tecnología</button>
        <button class="filter-btn">Ficción</button>
        <button class="filter-btn">Negocios</button>
    </div>

    <div class="section-title">🧘 Salud y Bienestar</div>
    <div class="card-container">
        <div class="card">
            <div style="height:100px; background:#e8f5e9; border-radius:5px;"></div>
            <p>Mente Sana</p>
            <p class="price">$18.000</p>
        </div>
        <div class="card">
            <div style="height:100px; background:#e8f5e9; border-radius:5px;"></div>
            <p>Yoga Total</p>
            <p class="price">$16.000</p>
        </div>
    </div>

    <div class="section-title">🛠️ Tecnología y Motores</div>
    <div class="card-container">
        <div class="card">
            <div style="height:100px; background:#f5f5f5; border-radius:5px;"></div>
            <p>Electricidad Auto</p>
            <p class="price">$27.000</p>
        </div>
    </div>

    <div class="section-title">📚 Ficción y Literatura</div>
    <div class="card-container">
        <div class="card">
            <div style="height:100px; background:#fff3e0; border-radius:5px;"></div>
            <p>Zero to One</p>
            <p class="price">Consultar</p>
        </div>
    </div>

</body>
</html>
