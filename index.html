<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperationEbook | Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark: #020504; --neon: #00ff88; --gold: #ffcc00; --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); --shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); margin: 0; overflow-x: hidden; }
        
        /* HEADER */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); position: sticky; top:0; z-index: 1000; border-bottom: 1px solid var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 18px; color: var(--white); letter-spacing: 2px; }
        .logo span { color: var(--gold); }
        .nav-icons { display: flex; gap: 20px; font-size: 20px; }
        .icon-btn { cursor: pointer; position: relative; transition: 0.3s; }
        .icon-btn:hover { color: var(--neon); }
        #cart-count { position: absolute; top: -8px; right: -10px; background: #ff4444; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

        /* FILTROS DE EDAD */
        .age-nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .age-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-size: 10px; font-weight: 800; cursor: pointer; }
        .age-btn.active { background: var(--neon); color: black; box-shadow: var(--shadow); }

        /* BUSCADOR Y CATEGORÍAS */
        .search-box { padding: 20px; text-align: center; }
        .search-bar { width: 90%; max-width: 450px; padding: 12px 20px; border-radius: 30px; border: 1px solid var(--gold); background: #111; color: white; outline: none; }
        .quick-tags { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; }
        .tag { white-space: nowrap; padding: 7px 15px; background: var(--glass); border-radius: 20px; font-size: 11px; border: 1px solid #333; cursor: pointer; }
        .tag:hover { border-color: var(--neon); color: var(--neon); }

        /* SECCIONES HORIZONTALES */
        .section-header { padding: 0 20px; margin-top: 30px; display: flex; align-items: center; gap: 10px; }
        .section-header h2 { font-family: 'Orbitron'; font-size: 13px; color: var(--gold); text-transform: uppercase; margin: 0; }
        .line { height: 2px; flex-grow: 1; background: linear-gradient(90deg, var(--neon), transparent); }

        .scroller { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .card { min-width: 170px; background: #0d0d0d; border-radius: 15px; border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 12px; }
        .stars { color: var(--gold); font-size: 10px; margin-bottom: 5px; }
        .title { font-size: 11px; font-weight: 600; line-height: 1.3; height: 30px; }
        .price { color: var(--neon); font-weight: 800; font-size: 15px; margin-top: 8px; }
        .add-btn { width: 100%; padding: 10px; background: var(--neon); border: none; font-weight: 800; font-size: 10px; cursor: pointer; }

        /* MODALES (CARRITO Y CUENTA) */
        .side-modal { display: none; position: fixed; top: 0; right: 0; width: 85%; max-width: 320px; height: 100%; background: #050505; z-index: 2000; padding: 25px; border-left: 2px solid var(--neon); box-shadow: -10px 0 30px rgba(0,0,0,0.9); }
        .user-badge { background: var(--gold); color: black; padding: 5px 10px; border-radius: 5px; font-weight: 800; font-size: 10px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Superation<span>Ebook</span></div>
        <div class="nav-icons">
            <div class="icon-btn" onclick="toggleModal('user-modal')"><i class="fas fa-user-circle"></i></div>
            <div class="icon-btn" onclick="toggleModal('cart-modal')">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </div>

    <div class="age-nav">
        <button class="age-btn active" onclick="app.filterAge('todos', this)">TODO</button>
        <button class="age-btn" onclick="app.filterAge('menores', this)">JÓVENES (-18)</button>
        <button class="age-btn" onclick="app.filterAge('mayores', this)">PRO S.E. (+18)</button>
    </div>

    <div class="search-box">
        <input type="text" class="search-bar" placeholder="🔍 Buscar en SuperationEbook..." onkeyup="app.search()">
        <div class="quick-tags">
            <div class="tag">Mecánica</div><div class="tag">Cocina</div><div class="tag">Ingeniería</div>
            <div class="tag">Dropshipping</div><div class="tag">Trading</div><div class="tag">Fitness</div>
        </div>
    </div>

    <div id="main-content"></div>

    <div id="cart-modal" class="side-modal">
        <h3 style="font-family:'Orbitron'; color:var(--neon)">CARRITO S.E.</h3>
        <div id="cart-list" style="margin: 20px 0; font-size: 12px; max-height: 60%; overflow-y: auto;"></div>
        <hr style="border: 0.5px solid #333;">
        <div id="cart-total" style="font-size: 20px; font-weight: 800; margin: 20px 0;">TOTAL: $0</div>
        <button onclick="app.checkout()" style="width:100%; background:var(--neon); color:black; padding:15px; border:none; border-radius:10px; font-weight:800; cursor:pointer;">COMPRAR AHORA 💬</button>
        <p onclick="toggleModal('cart-modal')" style="text-align:center; margin-top:20px; font-size:12px; opacity:0.5; cursor:pointer;">Regresar</p>
    </div>

    <div id="user-modal" class="side-modal">
        <h3 style="font-family:'Orbitron';">MI CUENTA S.E.</h3>
        <p style="font-size:12px; opacity:0.7;">Bienvenido a la Academia.</p>
        <div class="user-badge">ALUMNO BRONCE</div>
        <div style="margin-top:30px;">
            <p style="font-size:11px;"><i class="fas fa-check-circle" style="color:var(--neon)"></i> Mis compras: 0</p>
            <p style="font-size:11px;"><i class="fas fa-gift" style="color:var(--gold)"></i> Bonos activos: 1</p>
        </div>
        <button onclick="toggleModal('user-modal')" style="margin-top:40px; width:100%; background:transparent; border:1px solid white; color:white; padding:10px; border-radius:10px; cursor:pointer;">Cerrar</button>
    </div>

<script>
    const app = {
        tel: "573223693926",
        cart: [],
        products: [
            { id: 1, cat: "Mecánica Pro", age: "mayores", t: "Inyección y Sensores", p: 48000, img: "https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?w=300" },
            { id: 2, cat: "Mecánica Pro", age: "mayores", t: "Electricidad Automotriz", p: 35000, img: "https://images.unsplash.com/photo-1504222490345-c075b6008014?w=300" },
            { id: 3, cat: "Cocinando S.E.", age: "todos", t: "Gourmet en 30 min", p: 18000, img: "https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=300" },
            { id: 4, cat: "Ingeniería Digital", age: "mayores", t: "Python para Negocios", p: 32000, img: "https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=300" },
            { id: 5, cat: "Dropshipping", age: "mayores", t: "Shopify Elite", p: 27000, img: "https://images.unsplash.com/photo-1556742044-3c52d6e88c62?w=300" },
            { id: 6, cat: "Jóvenes", age: "menores", t: "Mentalidad de Acero", p: 15000, img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=300" }
        ],

        render(filter = 'todos') {
            const content = document.getElementById('main-content');
            content.innerHTML = '';
            const cats = [...new Set(this.products.map(p => p.cat))];

            cats.forEach(cat => {
                const filtered = this.products.filter(p => p.cat === cat && (filter === 'todos' || p.age === filter));
                if (filtered.length === 0) return;

                let html = `<div class="section-header"><h2>${cat}</h2><div class="line"></div></div><div class="scroller">`;
                filtered.forEach(p => {
                    const rating = (Math.random() * (5.0 - 4.7) + 4.7).toFixed(1);
                    html += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="card-body">
                            <div class="stars"><i class="fas fa-star"></i> ${rating}</div>
                            <div class="title">${p.t}</div>
                            <div class="price">$${p.p.toLocaleString()}</div>
                        </div>
                        <button class="add-btn" onclick="app.addToCart(${p.id})">AÑADIR AL PACK</button>
                    </div>`;
                });
                content.innerHTML += html + '</div>';
            });
        },

        filterAge(age, btn) {
            document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.render(age);
        },

        addToCart(id) {
            const p = this.products.find(x => x.id === id);
            this.cart.push(p);
            this.updateCartUI();
            alert(`¡${p.t} añadido a SuperationEbook!`);
        },

        updateCartUI() {
            document.getElementById('cart-count').innerText = this.cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = this.cart.map((i, idx) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:5px;">
                    <span>${i.t}</span>
                    <span style="color:var(--neon)">$${i.p.toLocaleString()}</span>
                </div>
            `).join('');
            const total = this.cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('cart-total').innerText = "TOTAL: $" + total.toLocaleString();
        },

        checkout() {
            if(this.cart.length === 0) return alert("El carrito está vacío.");
            const msg = encodeURIComponent(`¡Hola! Vengo de SuperationEbook. Quiero adquirir:\n` + this.cart.map(i => `- ${i.t}`).join('\n') + `\nTotal: $${this.cart.reduce((s,i)=>s+i.p,0).toLocaleString()}`);
            window.open(`https://wa.me/${this.tel}?text=${msg}`);
        }
    };

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    app.render();
</script>
</body>
</html>
